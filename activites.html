<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Activités - Ngozistes du Royaume</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" type="image/png" href="images/favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2196f3;--secondary:#2196F3;--danger:#f44336;--dark:#010101;--light:#f4f4f4;--text:#666;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.1);--tr:all .2s ease;--fb-bg:#f0f2f5}
body{font-family:'Segoe UI',sans-serif;line-height:1.5;color:var(--text);padding-top:80px;overflow-x:hidden;background:var(--fb-bg)}
.container{max-width:1200px;margin:0 auto;padding:0 15px}
.header{position:fixed;top:0;left:0;width:100%;background:white;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:.5rem 5%;max-width:1400px;margin:0 auto;height:80px}
.logo{display:flex;align-items:center;gap:10px}.logo img{height:50px;width:auto}.logo span{font-size:1.5rem;font-weight:bold}
.logo-ngozistes{color:#ff0000}.logo-royaume{color:#000}
.nav-menu{display:flex;list-style:none;gap:30px;align-items:center}
.nav-menu a{text-decoration:none;color:var(--dark);font-weight:500;transition:var(--tr);position:relative}
.nav-menu a:hover,.nav-menu a.active{color:var(--primary)}
.nav-menu a.active::after{content:'';position:absolute;bottom:-5px;left:0;width:100%;height:2px;background:var(--primary)}
.user-profile{display:flex;align-items:center;gap:10px;cursor:pointer;padding:5px 15px;border-radius:50px;background:var(--light);transition:var(--tr)}.user-profile:hover{background:#e0e0e0}
.nav-avatar{width:35px;height:35px;border-radius:50%;object-fit:cover;border:2px solid var(--primary)}
.user-name{font-weight:500;color:var(--dark)}
.user-dropdown{position:fixed;background:white;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.2);min-width:250px;z-index:2000}
.user-dropdown-header{display:flex;align-items:center;gap:15px;padding:15px;border-bottom:1px solid #eee}
.user-dropdown-header img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:3px solid var(--primary)}
.user-dropdown-info{display:flex;flex-direction:column}
.user-dropdown-info span{font-weight:600;color:var(--dark)}
.user-dropdown-info small{color:var(--text);font-size:.8rem}
.user-dropdown-menu{padding:10px 0}
.user-dropdown-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--text);text-decoration:none;transition:var(--tr)}
.user-dropdown-menu a:hover{background:var(--light);color:var(--primary)}
.dropdown-divider{height:1px;background:#eee;margin:8px 0}
.btn-login{background:var(--secondary);color:white!important;padding:10px 20px;border-radius:50px;display:flex;align-items:center;gap:5px}
.btn-adhesion{background:var(--primary);color:white!important;padding:10px 20px;border-radius:50px}
.hamburger{display:none;flex-direction:column;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{width:25px;height:3px;background:var(--dark);margin:2px 0;transition:var(--tr);display:block}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.page-header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;padding:90px 0 50px;text-align:center;margin-bottom:28px}
.page-header h1{font-size:2.5rem;margin-bottom:10px}
.page-header p{font-size:1rem;max-width:500px;margin:0 auto;opacity:.95}
.filters-bar{display:flex;justify-content:center;gap:9px;margin-bottom:22px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border:none;background:white;color:var(--dark);border-radius:20px;cursor:pointer;transition:var(--tr);font-size:.85rem;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.filter-btn:hover,.filter-btn.active{background:var(--primary);color:white}
.activities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.more-activities{display:none;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.more-activities.show{display:grid}
.act-card{background:white;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);transition:var(--tr);border:1px solid rgba(0,0,0,.05);cursor:pointer;display:flex;flex-direction:column;aspect-ratio:1/1.2}
.act-card:hover{box-shadow:0 5px 14px rgba(0,0,0,.15);transform:translateY(-3px)}
.act-img{width:100%;height:55%;overflow:hidden;position:relative;background:#e8e8e8;flex-shrink:0}
.act-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.act-card:hover .act-img img{transform:scale(1.04)}
.act-cat-badge{position:absolute;top:8px;right:8px;background:var(--primary);color:white;padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:600;z-index:2}
.act-body{padding:11px;display:flex;flex-direction:column;flex:1}
.act-date{display:flex;align-items:center;gap:4px;color:var(--primary);font-size:.73rem;font-weight:500;margin-bottom:5px}
.act-title{color:var(--dark);font-size:.92rem;font-weight:600;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.act-meta{font-size:.7rem;color:var(--text);display:flex;align-items:center;gap:4px;margin-top:auto}
.act-meta i{color:var(--primary);width:11px}
.show-more-wrap{display:flex;justify-content:center;margin:8px 0 24px}
.show-more-btn{display:flex;align-items:center;gap:8px;padding:10px 24px;background:white;border:1px solid #ddd;border-radius:30px;color:var(--primary);font-weight:600;font-size:.9rem;cursor:pointer;transition:var(--tr);box-shadow:var(--shadow)}
.show-more-btn:hover{border-color:var(--primary);background:var(--light)}
.plus-count{background:var(--primary);color:white;border-radius:20px;padding:2px 9px;font-weight:bold;font-size:.82rem}
.section-divider{border-top:2px dashed #ddd;margin:40px 0 28px;padding-top:14px}
.section-title{font-size:1.6rem;color:var(--dark);font-weight:700;margin-bottom:18px;padding-left:14px;border-left:5px solid var(--primary)}
.reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-bottom:14px}
.more-reports{display:none;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-bottom:14px}
.more-reports.show{display:grid}
.rep-card{background:white;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);transition:var(--tr);cursor:pointer;display:flex;flex-direction:column}
.rep-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.14)}
.rep-head{padding:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white}
.rep-head h3{font-size:1rem;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rep-head .rep-date{font-size:.75rem;opacity:.9;display:flex;align-items:center;gap:4px}
.rep-body{padding:14px;flex:1}
.rep-body p{font-size:.86rem;color:var(--text);margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.rep-thumbs{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.rep-thumbs img{width:36px;height:36px;border-radius:4px;object-fit:cover;cursor:pointer;transition:var(--tr);background:#e8e8e8}
.rep-thumbs img:hover{transform:scale(1.1)}
.rep-more-imgs{font-size:.75rem;color:var(--text);align-self:center;margin-left:4px}
/* attachements */
.rep-attachments{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.rep-att-link{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--light);border-radius:4px;font-size:.72rem;color:var(--dark);text-decoration:none;transition:var(--tr)}
.rep-att-link:hover{background:var(--secondary);color:white}
/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:white;max-width:680px;width:92%;border-radius:14px;padding:26px;position:relative;max-height:86vh;overflow-y:auto;margin:auto}
.modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(0,0,0,.07);border:none;border-radius:50%;font-size:18px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.modal-close:hover{background:var(--danger);color:white}
.modal-main-img{width:100%;height:200px;object-fit:cover;border-radius:10px;margin-bottom:18px;cursor:pointer;background:#e8e8e8}
.modal-title{font-size:1.4rem;font-weight:700;color:var(--dark);margin-bottom:14px}
.modal-meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:18px;padding:14px;background:var(--light);border-radius:10px}
.meta-item{display:flex;align-items:center;gap:7px;font-size:.88rem}
.meta-item i{color:var(--primary);width:16px}
.modal-desc h3{font-size:1rem;color:var(--dark);margin-bottom:9px}
.modal-desc p{font-size:.9rem;line-height:1.6;white-space:pre-line}
.modal-reports-section{margin-top:22px;padding-top:16px;border-top:1px solid #eee}
.modal-reports-section h3{font-size:1rem;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.modal-report-item{background:var(--light);border-radius:9px;padding:14px;margin-bottom:14px}
.modal-report-item h4{color:var(--dark);font-size:.9rem;margin-bottom:6px}
.modal-report-text{font-size:.85rem;line-height:1.5;color:var(--text);margin-bottom:9px;white-space:pre-line}
.modal-report-imgs{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0}
.modal-report-imgs img{width:60px;height:60px;border-radius:5px;object-fit:cover;cursor:pointer;transition:var(--tr);background:#e8e8e8}
.modal-report-imgs img:hover{transform:scale(1.08)}
.modal-att-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.modal-att-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--secondary);color:white;text-decoration:none;border-radius:4px;font-size:.78rem;transition:var(--tr)}
.modal-att-link:hover{background:#1976D2}
.pdf-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--secondary);color:white;text-decoration:none;border-radius:4px;font-size:.78rem;margin-top:7px;transition:var(--tr)}
.pdf-link:hover{background:#1976D2}
/* lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:4000;align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lb-img{max-width:92%;max-height:92vh;object-fit:contain;border-radius:4px}
.lb-close{position:absolute;top:16px;right:26px;color:white;font-size:40px;cursor:pointer;background:none;border:none;line-height:1}
.lb-close:hover{color:var(--primary)}
.loading-state{text-align:center;padding:60px;color:var(--text);background:white;border-radius:10px;box-shadow:var(--shadow)}
.loading-state::after{content:'';display:inline-block;width:18px;height:18px;margin-left:8px;border:2px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px;color:var(--text);background:white;border-radius:10px;box-shadow:var(--shadow);font-style:italic}
.error-state{text-align:center;padding:60px;color:var(--danger);background:white;border-radius:10px;box-shadow:var(--shadow)}
.footer{background:var(--dark);color:white;padding:40px 0 20px;margin-top:50px}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:28px;margin-bottom:28px}
.footer-ngozistes{color:#ff0000}.footer-royaume{color:#fff}
.footer-contact h4,.footer-social h4{margin-bottom:12px;color:var(--primary)}
.footer-contact p{margin-bottom:8px;font-size:.9rem}.footer-contact i{margin-right:8px;color:var(--primary)}
.footer-contact a{color:white;text-decoration:none}.footer-contact a:hover{color:var(--primary)}
.social-icons{display:flex;gap:14px}.social-icons a{color:white;font-size:1.2rem;transition:var(--tr)}.social-icons a:hover{color:var(--primary)}
.footer-bottom{text-align:center;padding-top:16px;border-top:1px solid #444;font-size:.8rem}
.footer-bottom a{color:white;text-decoration:none;margin-left:14px}.footer-bottom a:hover{color:var(--primary)}
@media(max-width:900px){.activities-grid,.more-activities{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){body{padding-top:70px}.navbar{height:70px}.hamburger{display:flex}.nav-menu{position:fixed;top:70px;left:-100%;width:100%;height:calc(100vh - 70px);background:white;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:50px;transition:left .3s;z-index:999}.nav-menu.active{left:0}.nav-menu li{margin:12px 0}.user-profile{padding:5px}.user-name{display:none}.page-header{padding:80px 0 38px}.page-header h1{font-size:2rem}.activities-grid,.more-activities{grid-template-columns:repeat(2,1fr);gap:10px}.reports-grid,.more-reports{grid-template-columns:1fr}.modal-meta-grid{grid-template-columns:1fr}}
@media(max-width:480px){body{padding-top:60px}.navbar{height:60px}.nav-menu{top:60px}.activities-grid,.more-activities{grid-template-columns:repeat(2,1fr);gap:8px}}
</style>
</head>
<body>
<div id="main-navbar"></div>

<section class="page-header">
  <div class="container">
    <h1>Nos activités</h1>
    <p>Découvrez toutes les actions des Ngozistes du Royaume</p>
  </div>
</section>

<section style="padding:14px 0 50px;">
<div class="container">
  <div class="filters-bar" id="filters-bar">
    <button class="filter-btn active" data-cat="all">Toutes</button>
    <button class="filter-btn" data-cat="environnement"><i class="fas fa-leaf"></i> Environnement</button>
    <button class="filter-btn" data-cat="social"><i class="fas fa-heart"></i> Social</button>
    <button class="filter-btn" data-cat="culture"><i class="fas fa-palette"></i> Culture</button>
    <button class="filter-btn" data-cat="education"><i class="fas fa-graduation-cap"></i> Éducation</button>
    <button class="filter-btn" data-cat="autre">Autre</button>
  </div>
  <div id="activities-wrap"></div>
  <div class="section-divider"></div>
  <h2 class="section-title">Comptes rendus</h2>
  <div id="reports-wrap"></div>
</div>
</section>

<div class="modal-overlay" id="actModal" role="dialog" aria-modal="true">
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Fermer">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lb-close" aria-label="Fermer">&times;</button>
  <img class="lb-img" id="lb-img" src="" alt="Agrandissement">
</div>

<div id="main-footer"></div>
<script src="components.js"></script>
<script>
'use strict';

var activitiesData = [];
var reportsData    = [];

function safeImg(src) {
    return (src && src.trim() && src !== 'null' && src !== 'undefined') ? src : window.FALLBACK_IMG;
}
function safeAvatar(src) {
    return (src && src.trim() && src !== 'null' && src !== 'undefined') ? src : window.FALLBACK_AVATAR;
}

document.addEventListener('DOMContentLoaded', async function () {
    initFilters();
    initModal();
    initLightbox();
    await Promise.allSettled([loadActivities('all'), loadReports()]);
});

function initFilters() {
    document.getElementById('filters-bar').addEventListener('click', function (e) {
        var btn = e.target.closest('.filter-btn'); if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        loadActivities(btn.dataset.cat);
    });
}

async function loadActivities(cat) {
    var wrap = document.getElementById('activities-wrap');
    wrap.innerHTML = '<div class="loading-state">Chargement des activités…</div>';
    try {
        var q = window.supabase.from('activities').select('*').order('date', { ascending: false });
        if (cat !== 'all') q = q.eq('category', cat);
        var r = await q;
        if (r.error) throw r.error;
        activitiesData = r.data || [];
        renderSection(wrap, activitiesData, createActCard, 'activities-grid', 'more-activities');
    } catch (err) {
        wrap.innerHTML = '<div class="error-state"><i class="fas fa-exclamation-circle"></i> Erreur de chargement</div>';
    }
}

async function loadReports() {
    var wrap = document.getElementById('reports-wrap');
    wrap.innerHTML = '<div class="loading-state">Chargement des comptes rendus…</div>';
    try {
        var r = await window.supabase.from('activity_reports')
            .select('*, activity:activity_id(title, category)')
            .order('created_at', { ascending: false });
        if (r.error) throw r.error;
        reportsData = r.data || [];
        renderSection(wrap, reportsData, createRepCard, 'reports-grid', 'more-reports');
    } catch (err) {
        wrap.innerHTML = '<div class="error-state"><i class="fas fa-exclamation-circle"></i> Erreur de chargement</div>';
    }
}

function renderSection(wrap, items, cardFn, gridClass, moreClass, perPage) {
    perPage = perPage || 4;
    if (!items || !items.length) {
        wrap.innerHTML = '<div class="empty-state">Aucun élément pour le moment</div>';
        return;
    }
    var initial = items.slice(0, perPage);
    var rest    = items.slice(perPage);
    var moreId  = moreClass + '-' + Date.now();
    var html = '<div class="' + gridClass + '">' + initial.map(cardFn).join('') + '</div>';
    if (rest.length) {
        html += '<div class="show-more-wrap">'
              + '<button class="show-more-btn" id="btn-' + moreId + '" type="button">'
              + '<i class="fas fa-chevron-down"></i> Voir <span class="plus-count">+' + rest.length + '</span>'
              + '</button></div>'
              + '<div id="' + moreId + '" class="' + moreClass + '">' + rest.map(cardFn).join('') + '</div>';
    }
    wrap.innerHTML = html;
    if (rest.length) {
        var btn     = document.getElementById('btn-' + moreId);
        var moreDiv = document.getElementById(moreId);
        var cnt     = rest.length;
        btn.addEventListener('click', function () {
            var open = moreDiv.classList.toggle('show');
            btn.innerHTML = open
                ? '<i class="fas fa-chevron-up"></i> Voir moins'
                : '<i class="fas fa-chevron-down"></i> Voir <span class="plus-count">+' + cnt + '</span>';
        });
    }
}

function createActCard(a) {
    var imgSrc = safeImg(a.image);
    var title  = window.escapeHtml(a.title || 'Sans titre');
    var loc    = window.escapeHtml(window.truncateText(a.location || '', 18));
    var sid    = encodeURIComponent(a.id);
    var dateStr = a.date ? new Date(a.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
    return '<article class="act-card" data-acid="' + sid + '" role="button" tabindex="0" aria-label="' + title + '">'
         + '<div class="act-img">'
         + '<img src="' + window.escapeHtml(imgSrc) + '" alt="' + title + '" loading="lazy" onerror="window.imgOnError(this)">'
         + '<span class="act-cat-badge">' + window.getCategoryLabel(a.category) + '</span>'
         + '</div>'
         + '<div class="act-body">'
         + (dateStr ? '<div class="act-date"><i class="fas fa-calendar-alt"></i>' + dateStr + '</div>' : '')
         + '<div class="act-title">' + title + '</div>'
         + (loc ? '<div class="act-meta"><i class="fas fa-map-marker-alt"></i>' + loc + '</div>' : '')
         + '</div></article>';
}

function createRepCard(r) {
    var dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
    var imgs    = Array.isArray(r.images) ? r.images.filter(function(i){return i && i.trim();}) : [];
    var atts    = Array.isArray(r.attachments) ? r.attachments : [];
    var title   = window.escapeHtml(r.title || 'Compte rendu');
    var text    = window.escapeHtml(window.truncateText(r.content || '', 120));
    var sid     = encodeURIComponent(r.id);

    var thumbsHtml = imgs.slice(0, 3).map(function (img) {
        var s = window.escapeHtml(img);
        return '<img src="' + s + '" alt="Photo" loading="lazy" onerror="window.imgOnError(this)"'
             + ' onclick="event.stopPropagation();openLb(\'' + s + '\')">';
    }).join('');

    var attHtml = '';
    if (atts.length) {
        var icons = {pdf:'fa-file-pdf',doc:'fa-file-word',docx:'fa-file-word',xls:'fa-file-excel',xlsx:'fa-file-excel',ppt:'fa-file-powerpoint',pptx:'fa-file-powerpoint'};
        attHtml = '<div class="rep-attachments">'
            + atts.slice(0,3).map(function(att){
                var ext = (att.name||'').split('.').pop().toLowerCase();
                var ic = icons[ext]||'fa-file';
                return '<a href="' + window.escapeHtml(att.data||'#') + '" download="' + window.escapeHtml(att.name||'fichier') + '" class="rep-att-link" onclick="event.stopPropagation()"><i class="fas ' + ic + '"></i>' + window.escapeHtml(window.truncateText(att.name||'',18)) + '</a>';
            }).join('')
            + '</div>';
    }

    return '<article class="rep-card" data-repid="' + sid + '" role="button" tabindex="0" aria-label="' + title + '">'
         + '<div class="rep-head"><h3>' + title + '</h3>'
         + '<div class="rep-date"><i class="fas fa-calendar"></i>' + dateStr + '</div></div>'
         + '<div class="rep-body"><p>' + text + '</p>'
         + (imgs.length
             ? '<div class="rep-thumbs">' + thumbsHtml
               + (imgs.length > 3 ? '<span class="rep-more-imgs">+' + (imgs.length - 3) + '</span>' : '')
               + '</div>' : '')
         + attHtml
         + '</div></article>';
}

document.addEventListener('click', function (e) {
    var actCard = e.target.closest('.act-card[data-acid]');
    var repCard = e.target.closest('.rep-card[data-repid]');
    if (actCard) openActivityModal(decodeURIComponent(actCard.dataset.acid));
    if (repCard) openReportModal(decodeURIComponent(repCard.dataset.repid));
});
document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    var actCard = document.activeElement.closest('.act-card[data-acid]');
    var repCard = document.activeElement.closest('.rep-card[data-repid]');
    if (actCard) { e.preventDefault(); openActivityModal(decodeURIComponent(actCard.dataset.acid)); }
    if (repCard) { e.preventDefault(); openReportModal(decodeURIComponent(repCard.dataset.repid)); }
});

async function openActivityModal(id) {
    var a = activitiesData.find(function (x) { return String(x.id) === String(id); });
    if (!a) return;
    var linked = reportsData.filter(function (r) { return String(r.activity_id) === String(id); });
    var imgSrc = safeImg(a.image);
    var title  = window.escapeHtml(a.title || '');
    var desc   = a.description ? window.escapeHtml(a.description) : 'Aucune description disponible.';
    var dateStr = a.date ? new Date(a.date).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : '';

    var attIcons = {pdf:'fa-file-pdf',doc:'fa-file-word',docx:'fa-file-word',xls:'fa-file-excel',xlsx:'fa-file-excel',ppt:'fa-file-powerpoint',pptx:'fa-file-powerpoint'};

    var reportsHtml = '';
    if (linked.length) {
        reportsHtml = '<div class="modal-reports-section">'
            + '<h3><i class="fas fa-file-alt" style="color:var(--primary);"></i> Comptes rendus (' + linked.length + ')</h3>'
            + linked.map(function (rp) {
                var rimgs = Array.isArray(rp.images) ? rp.images.filter(function(i){return i&&i.trim();}) : [];
                var ratts = Array.isArray(rp.attachments) ? rp.attachments : [];
                var rpDate = rp.created_at ? new Date(rp.created_at).toLocaleDateString('fr-FR') : '';
                var attListHtml = '';
                if (ratts.length) {
                    attListHtml = '<div class="modal-att-list">'
                        + ratts.map(function(att){
                            var ext=(att.name||'').split('.').pop().toLowerCase();
                            var ic=attIcons[ext]||'fa-file';
                            return '<a href="'+window.escapeHtml(att.data||'#')+'" download="'+window.escapeHtml(att.name||'fichier')+'" class="modal-att-link"><i class="fas '+ic+'"></i>'+window.escapeHtml(att.name||'Fichier')+'</a>';
                        }).join('')
                        + '</div>';
                }
                return '<div class="modal-report-item">'
                    + '<h4>' + window.escapeHtml(rp.title || '') + ' <small style="color:#aaa;font-weight:400;font-size:.75rem;">' + rpDate + '</small></h4>'
                    + '<div class="modal-report-text">' + window.escapeHtml(rp.content || '') + '</div>'
                    + (rimgs.length ? '<div class="modal-report-imgs">' + rimgs.map(function (mi) {
                        var s = window.escapeHtml(mi);
                        return '<img src="' + s + '" alt="Photo" onerror="window.imgOnError(this)" onclick="openLb(\'' + s + '\')">';
                    }).join('') + '</div>' : '')
                    + attListHtml
                    + (rp.pdf_url ? '<a href="' + window.escapeHtml(rp.pdf_url) + '" target="_blank" class="pdf-link"><i class="fas fa-file-pdf"></i> Télécharger PDF</a>' : '')
                    + '</div>';
            }).join('') + '</div>';
    }

    document.getElementById('modal-body').innerHTML =
        '<img src="' + window.escapeHtml(imgSrc) + '" alt="' + title + '" class="modal-main-img" id="m-main-img" onerror="window.imgOnError(this)">'
      + '<h2 class="modal-title">' + title + '</h2>'
      + '<div class="modal-meta-grid">'
      + (dateStr ? '<div class="meta-item"><i class="fas fa-calendar"></i><span>' + dateStr + '</span></div>' : '')
      + (a.location ? '<div class="meta-item"><i class="fas fa-map-marker-alt"></i><span>' + window.escapeHtml(a.location) + '</span></div>' : '')
      + '<div class="meta-item"><i class="fas fa-tag"></i><span>' + window.getCategoryLabel(a.category) + '</span></div>'
      + (a.participants_count ? '<div class="meta-item"><i class="fas fa-users"></i><span>' + a.participants_count + ' participants</span></div>' : '')
      + '</div>'
      + '<div class="modal-desc"><h3>Description</h3><p>' + desc + '</p></div>'
      + reportsHtml;

    document.getElementById('m-main-img').addEventListener('click', function () { openLb(imgSrc); });
    openModalEl();
}

function openReportModal(id) {
    var r = reportsData.find(function (x) { return String(x.id) === String(id); });
    if (!r) return;
    var imgs    = Array.isArray(r.images) ? r.images.filter(function(i){return i&&i.trim();}) : [];
    var atts    = Array.isArray(r.attachments) ? r.attachments : [];
    var title   = window.escapeHtml(r.title || '');
    var content = window.escapeHtml(r.content || '');
    var dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : '';
    var actTitle = r.activity ? window.escapeHtml(r.activity.title || '') : '';

    var attIcons = {pdf:'fa-file-pdf',doc:'fa-file-word',docx:'fa-file-word',xls:'fa-file-excel',xlsx:'fa-file-excel',ppt:'fa-file-powerpoint',pptx:'fa-file-powerpoint'};

    var attHtml = '';
    if (atts.length) {
        attHtml = '<div class="modal-reports-section"><h3><i class="fas fa-paperclip" style="color:var(--primary);"></i> Fichiers joints (' + atts.length + ')</h3>'
            + '<div class="modal-att-list">'
            + atts.map(function(att){
                var ext=(att.name||'').split('.').pop().toLowerCase();
                var ic=attIcons[ext]||'fa-file';
                return '<a href="'+window.escapeHtml(att.data||'#')+'" download="'+window.escapeHtml(att.name||'fichier')+'" class="modal-att-link"><i class="fas '+ic+'"></i>'+window.escapeHtml(att.name||'Fichier')+'</a>';
            }).join('')
            + '</div></div>';
    }

    document.getElementById('modal-body').innerHTML =
        '<h2 class="modal-title">' + title + '</h2>'
      + '<div class="modal-meta-grid">'
      + (dateStr ? '<div class="meta-item"><i class="fas fa-calendar"></i><span>' + dateStr + '</span></div>' : '')
      + (actTitle ? '<div class="meta-item"><i class="fas fa-running"></i><span>' + actTitle + '</span></div>' : '')
      + '</div>'
      + '<div class="modal-desc"><h3>Contenu</h3><p>' + content + '</p></div>'
      + (imgs.length
          ? '<div class="modal-reports-section"><h3><i class="fas fa-images" style="color:var(--primary);"></i> Photos (' + imgs.length + ')</h3>'
            + '<div class="modal-report-imgs" style="flex-wrap:wrap;">'
            + imgs.map(function (mi) {
                var s = window.escapeHtml(mi);
                return '<img src="' + s + '" alt="Photo" style="width:80px;height:80px;" onerror="window.imgOnError(this)" onclick="openLb(\'' + s + '\')">';
            }).join('') + '</div></div>' : '')
      + attHtml
      + (r.pdf_url ? '<div style="margin-top:16px;"><a href="' + window.escapeHtml(r.pdf_url) + '" target="_blank" class="pdf-link"><i class="fas fa-file-pdf"></i> Télécharger le PDF</a></div>' : '');

    openModalEl();
}

function initModal() {
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('actModal').addEventListener('click', function (e) { if (e.target === this) closeModal(); });
}
function openModalEl()  { document.getElementById('actModal').classList.add('active');    document.body.style.overflow = 'hidden'; }
function closeModal()   { document.getElementById('actModal').classList.remove('active'); document.body.style.overflow = ''; }

function initLightbox() {
    document.getElementById('lb-close').addEventListener('click', closeLb);
    document.getElementById('lightbox').addEventListener('click', function (e) { if (e.target === this) closeLb(); });
}
function openLb(src) {
    var safeSrc = (src && src.trim() && src !== 'null') ? src : window.FALLBACK_IMG;
    document.getElementById('lb-img').src = safeSrc;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeLb() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; }
window.openLb = openLb;

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { closeModal(); closeLb(); }
});
</script>
</body>
</html>
