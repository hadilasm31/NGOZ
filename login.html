<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Connexion - Ngozistes du Royaume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#2196F3;--secondary:#2196F3;--danger:#f44336;--dark:#010101;--light:#f4f4f4;--text:#666;--radius:8px;--shadow:0 5px 15px rgba(0,0,0,.1);--tr:all .3s ease}
        body{font-family:'Segoe UI',sans-serif;padding-top:80px;line-height:1.6;color:var(--text);background:linear-gradient(135deg,var(--primary),var(--secondary));min-height:100vh}
        .container{max-width:1200px;margin:0 auto;padding:0 20px}
        .header{position:fixed;top:0;left:0;width:100%;background:white;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:.5rem 5%;max-width:1400px;margin:0 auto;height:80px}
        .logo{display:flex;align-items:center;gap:10px}
        .logo img{height:50px;width:auto}
        .logo span{font-size:1.5rem;font-weight:bold}
        .logo-ngozistes{color:#ff0000}.logo-royaume{color:#000}
        .nav-menu{display:flex;list-style:none;gap:30px;align-items:center}
        .nav-menu a{text-decoration:none;color:var(--dark);font-weight:500;transition:var(--tr)}
        .nav-menu a:hover,.nav-menu a.active{color:var(--primary)}
        .btn-login{background:var(--secondary);color:white!important;padding:10px 20px;border-radius:50px;display:flex;align-items:center;gap:5px}
        .btn-adhesion{background:var(--primary);color:white!important;padding:10px 20px;border-radius:50px}
        .hamburger{display:none;flex-direction:column;cursor:pointer;background:none;border:none;padding:4px}
        .hamburger span{width:25px;height:3px;background:var(--dark);margin:2px 0;transition:var(--tr);display:block}
        .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
        .hamburger.active span:nth-child(2){opacity:0}
        .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
        .login-section{padding:40px 0 60px;min-height:calc(100vh - 80px);display:flex;align-items:center;justify-content:center}
        .login-box{max-width:420px;width:90%;margin:0 auto;background:white;padding:40px;border-radius:var(--radius);box-shadow:var(--shadow)}
        .login-box h1{text-align:center;color:var(--dark);margin-bottom:8px}
        .subtitle{text-align:center;color:var(--text);margin-bottom:28px}
        .alert{padding:12px 15px;border-radius:var(--radius);margin-bottom:18px;display:none;font-weight:500;text-align:center}
        .alert.error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
        .alert.success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
        .alert.warning{background:#fff3e0;color:#e65100;border:1px solid #ffe0b2}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:5px;font-weight:500;color:var(--dark)}
        .form-group input{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:var(--radius);font-size:1rem;transition:var(--tr)}
        .form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
        .pwd-wrap{position:relative;display:flex;align-items:center}
        .pwd-wrap input{padding-right:44px}
        .toggle-pwd{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--text);font-size:1.1rem}
        .toggle-pwd:hover{color:var(--primary)}
        .form-opts{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
        .remember{display:flex;align-items:center;gap:6px}
        .remember input{width:16px;height:16px;accent-color:var(--primary)}
        .forgot{background:none;border:none;color:var(--secondary);cursor:pointer;font-size:.95rem}
        .forgot:hover{text-decoration:underline}
        .btn-submit{width:100%;padding:13px;background:var(--primary);color:white;border:none;border-radius:var(--radius);font-size:1rem;font-weight:bold;cursor:pointer;transition:var(--tr)}
        .btn-submit:hover{background:#45a049;transform:translateY(-2px)}
        .btn-submit:disabled{background:#ccc;cursor:not-allowed;transform:none}
        .register-link{text-align:center;margin-top:18px;padding-top:18px;border-top:1px solid #eee}
        .register-link a{color:var(--primary);text-decoration:none;font-weight:bold}
        .spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
        .shake{animation:shake .4s ease}
        .footer{background:var(--dark);color:white;padding:40px 0 20px;margin-top:40px}
        .footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px;margin-bottom:30px}
        .footer-ngozistes{color:#ff0000}.footer-royaume{color:#fff}
        .footer-contact h4,.footer-social h4{margin-bottom:12px;color:var(--primary)}
        .footer-contact p{margin-bottom:8px;font-size:.9rem}
        .footer-contact i{margin-right:8px;color:var(--primary)}
        .footer-contact a{color:white;text-decoration:none}
        .footer-contact a:hover{color:var(--primary)}
        .social-icons{display:flex;gap:15px}
        .social-icons a{color:white;font-size:1.2rem;transition:var(--tr)}
        .social-icons a:hover{color:var(--primary)}
        .footer-bottom{text-align:center;padding-top:16px;border-top:1px solid #444;font-size:.8rem}
        @media(max-width:768px){
            body{padding-top:70px}.navbar{height:70px}
            .hamburger{display:flex}
            .nav-menu{position:fixed;top:70px;left:-100%;width:100%;height:calc(100vh - 70px);background:white;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:50px;transition:left .3s;z-index:999}
            .nav-menu.active{left:0}.nav-menu li{margin:12px 0}
            .login-box{margin:0 20px;padding:28px 20px}
            .form-opts{flex-direction:column;align-items:flex-start}
        }
        @media(max-width:480px){body{padding-top:60px}.navbar{height:60px}.nav-menu{top:60px;height:calc(100vh - 60px)}}
    </style>
</head>
<body>
    <div id="main-navbar"></div>
    <section class="login-section">
        <div class="login-box">
            <h1>Connexion</h1>
            <p class="subtitle">Accédez à votre espace membre</p>
            <div class="alert" id="login-alert" role="alert" aria-live="polite"></div>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="votre@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="pwd-wrap">
                        <input type="password" id="password" name="password" required placeholder="********" autocomplete="current-password">
                        <button type="button" class="toggle-pwd" id="toggle-pwd" aria-label="Afficher/masquer">
                            <i class="fas fa-eye" id="pwd-icon"></i>
                        </button>
                    </div>
                </div>
                <div class="form-opts">
                    <label class="remember">
                        <input type="checkbox" id="remember">Se souvenir de moi
                    </label>
                    <button type="button" class="forgot" id="forgot-btn">Mot de passe oublié ?</button>
                </div>
                <button type="submit" class="btn-submit" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
                <div class="register-link">
                    Pas encore membre ? <a href="adhesion.html">Adhérez maintenant</a>
                </div>
            </form>
        </div>
    </section>
    <div id="main-footer"></div>
    <script src="components.js"></script>
    <script>
        'use strict';

        document.addEventListener('DOMContentLoaded', function () {
            try {
                const rem = localStorage.getItem('ngozistes_remember');
                if (rem) {
                    document.getElementById('email').value = rem;
                    document.getElementById('remember').checked = true;
                }
            } catch (_) {}

            document.getElementById('toggle-pwd').addEventListener('click', function () {
                var i = document.getElementById('password');
                var ic = document.getElementById('pwd-icon');
                if (i.type === 'password') {
                    i.type = 'text';
                    ic.className = 'fas fa-eye-slash';
                } else {
                    i.type = 'password';
                    ic.className = 'fas fa-eye';
                }
            });

            document.getElementById('forgot-btn').addEventListener('click', function () {
                window.showToast('Contactez un administrateur pour réinitialiser votre mot de passe.', 'info');
            });

            document.getElementById('login-form').addEventListener('submit', handleLogin);
        });

        function showAlert(msg, type) {
            var el = document.getElementById('login-alert');
            el.textContent = msg;
            el.className = 'alert ' + type;
            el.style.display = 'block';
        }

        function shakeBox() {
            var b = document.querySelector('.login-box');
            b.classList.add('shake');
            setTimeout(function(){ b.classList.remove('shake'); }, 400);
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            var email = document.getElementById('email').value.trim().toLowerCase();
            var password = document.getElementById('password').value;
            var remember = document.getElementById('remember').checked;
            var btn = document.getElementById('login-btn');

            if (!email || !password) {
                showAlert('Veuillez remplir tous les champs.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Connexion...';
            document.getElementById('login-alert').style.display = 'none';

            try {
                var user = await window.Auth.login(email, password);

                if (remember) {
                    try { localStorage.setItem('ngozistes_remember', email); } catch(_) {}
                } else {
                    try { localStorage.removeItem('ngozistes_remember'); } catch(_) {}
                }

                showAlert('✅ Bienvenue ' + (user.prenom || '') + ' !', 'success');

                setTimeout(function () {
                    if (user.role === 'admin' || user.role === 'super_admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        window.location.href = 'member/dashboard.html';
                    }
                }, 1000);
            } catch (err) {
                var msg = err.message;
                if (msg === 'pending') {
                    showAlert('⏳ Votre demande est en attente de validation par un administrateur.', 'warning');
                } else if (msg === 'inactive') {
                    showAlert('🚫 Votre compte a été désactivé. Contactez un administrateur.', 'error');
                } else if (msg === 'email_exists') {
                    showAlert('Cette adresse email est déjà utilisée.', 'error');
                } else {
                    showAlert(msg || 'Erreur lors de la connexion.', 'error');
                }
                shakeBox();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        }
    </script>
</body>
</html>
