<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Groupes Bureau - Ngozistes du Royaume</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" type="image/png" href="../images/favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --wa-bg:#0b141a;
  --wa-sidebar:#111b21;
  --wa-panel:#202c33;
  --wa-item:#202c33;
  --wa-item-hover:#2a3942;
  --wa-mine:#005c4b;
  --wa-theirs:#202c33;
  --wa-input:#2a3942;
  --wa-border:#2a3942;
  --wa-green:#00a884;
  --wa-text:#e9edef;
  --wa-muted:#8696a0;
  --wa-header:#202c33;
  --primary:#4CAF50;
  --secondary:#2196F3;
  --danger:#f44336;
  --warning:#ff9800;
  --purple:#9c27b0
}
html,body{height:100%;overflow:hidden;background:var(--wa-bg)}
body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{height:52px;background:#1a2632;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:1px solid var(--wa-border)}
.back-link{color:var(--wa-muted);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:6px;transition:color .2s;white-space:nowrap}
.back-link:hover{color:var(--wa-green)}
.topbar-logo{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid var(--wa-green)}
.topbar-title{color:var(--wa-text);font-size:.88rem;font-weight:500}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-user img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--wa-green)}
.topbar-user span{color:var(--wa-text);font-size:.8rem}

/* ── LAYOUT ── */
.wa-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}

/* ══════════════ SIDEBAR ══════════════ */
.wa-sidebar{width:370px;min-width:300px;background:var(--wa-sidebar);display:flex;flex-direction:column;border-right:1px solid var(--wa-border);flex-shrink:0;transition:transform .3s}

.sb-header{padding:12px 16px;background:var(--wa-panel);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--wa-border)}
.sb-header-left{display:flex;align-items:center;gap:11px}
.sb-my-av{width:38px;height:38px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--wa-green)}
.sb-title{color:var(--wa-text);font-size:1rem;font-weight:600}
.sb-icons{display:flex;gap:2px}
.icon-btn{background:none;border:none;color:var(--wa-muted);font-size:1rem;cursor:pointer;padding:8px;border-radius:50%;transition:all .2s;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--wa-item-hover);color:var(--wa-text)}

.sb-search{padding:8px 12px;background:var(--wa-sidebar);flex-shrink:0}
.search-box{display:flex;align-items:center;background:var(--wa-panel);border-radius:8px;padding:7px 12px;gap:9px}
.search-box i{color:var(--wa-muted);font-size:.85rem}
.search-box input{background:none;border:none;outline:none;color:var(--wa-text);font-size:.88rem;flex:1;font-family:inherit}
.search-box input::placeholder{color:var(--wa-muted)}

.conv-list{flex:1;overflow-y:auto}
.conv-list::-webkit-scrollbar{width:5px}
.conv-list::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}

.conv-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s;position:relative;border-bottom:1px solid #1a2530}
.conv-item:hover{background:var(--wa-item-hover)}
.conv-item.active{background:var(--wa-item-hover)}
.conv-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--wa-green);border-radius:0 2px 2px 0}
.conv-av{width:48px;height:48px;border-radius:50%;flex-shrink:0;background:var(--wa-panel);display:flex;align-items:center;justify-content:center;font-size:1.2rem;overflow:hidden;position:relative}
.conv-av img{width:100%;height:100%;object-fit:cover}
.conv-info{flex:1;min-width:0}
.conv-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.conv-name{color:var(--wa-text);font-size:.92rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.conv-time{color:var(--wa-muted);font-size:.7rem;flex-shrink:0}
.conv-time.has-unread{color:var(--wa-green)}
.conv-bottom{display:flex;justify-content:space-between;align-items:center;gap:6px}
.conv-prev{color:var(--wa-muted);font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.conv-badge{background:var(--wa-green);color:white;border-radius:50%;width:19px;height:19px;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.group-tag{background:rgba(0,168,132,.15);color:var(--wa-green);border-radius:4px;font-size:.62rem;padding:1px 5px;font-weight:600;margin-left:4px;white-space:nowrap}

/* ══════════════ CHAT ZONE ══════════════ */
.wa-chat{flex:1;display:flex;flex-direction:column;background:var(--wa-bg);position:relative;overflow:hidden}

/* Fond motif */
.wa-chat::before{content:'';position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M30 30c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c0 5.523-4.477 10-10 10s-10-4.477-10-10 4.477-10 10-10zM10 10c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c0 5.523-4.477 10-10 10S0 25.523 0 20s4.477-10 10-10z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0}

.chat-header{background:var(--wa-header);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:2;border-bottom:1px solid var(--wa-border)}
.ch-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:var(--wa-panel);display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden;cursor:pointer}
.ch-avatar img{width:100%;height:100%;object-fit:cover}
.ch-info{flex:1;cursor:pointer}
.ch-name{color:var(--wa-text);font-size:.95rem;font-weight:600}
.ch-sub{color:var(--wa-muted);font-size:.75rem;margin-top:1px}
.ch-actions{display:flex;gap:2px}

.messages-area{flex:1;overflow-y:auto;padding:10px 8%;position:relative;z-index:1;display:flex;flex-direction:column;gap:1px}
.messages-area::-webkit-scrollbar{width:5px}
.messages-area::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}

.date-chip{align-self:center;background:#182229;color:var(--wa-muted);padding:5px 14px;border-radius:8px;font-size:.72rem;margin:10px 0;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:1}

/* Bulles */
.msg-row{display:flex;align-items:flex-end;gap:6px;max-width:68%;margin-bottom:1px}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-row.theirs{align-self:flex-start}
.msg-row.system-row{align-self:center;max-width:85%}

.msg-av{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-bottom:2px;background:var(--wa-panel);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--wa-muted);overflow:hidden}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-av.hidden{visibility:hidden}

.bubble{padding:7px 10px 5px;border-radius:8px;position:relative;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.4);max-width:100%}
.mine .bubble{background:var(--wa-mine);border-radius:8px 0 8px 8px}
.theirs .bubble{background:var(--wa-theirs);border-radius:0 8px 8px 8px}
.system-row .bubble{background:#182229;border-radius:8px;text-align:center;padding:6px 16px}

.mine .bubble::after{content:'';position:absolute;top:0;right:-8px;border-left:8px solid var(--wa-mine);border-top:8px solid transparent}
.theirs .bubble::before{content:'';position:absolute;top:0;left:-8px;border-right:8px solid var(--wa-theirs);border-top:8px solid transparent}

.msg-sender{font-size:.75rem;font-weight:700;margin-bottom:3px}
.c0{color:#53bdeb}.c1{color:#df7900}.c2{color:#ad5cbb}.c3{color:#20c9c9}.c4{color:#36be62}.c5{color:#ff7675}.c6{color:#a29bfe}.c7{color:#fd79a8}

.reply-quote{background:rgba(255,255,255,.07);border-left:3px solid var(--wa-green);border-radius:4px;padding:5px 8px;margin-bottom:5px;cursor:pointer;transition:background .15s}
.reply-quote:hover{background:rgba(255,255,255,.12)}
.rq-name{font-size:.73rem;font-weight:600;color:var(--wa-green);margin-bottom:2px}
.rq-text{font-size:.76rem;color:var(--wa-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.msg-text{font-size:.88rem;color:var(--wa-text);line-height:1.45;white-space:pre-wrap}
.msg-deleted{font-size:.83rem;color:var(--wa-muted);font-style:italic;display:flex;align-items:center;gap:5px}
.msg-footer{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:2px}
.msg-time{font-size:.66rem;color:var(--wa-muted)}
.msg-ticks{font-size:.72rem;color:var(--wa-muted)}
.msg-ticks.read{color:#53bdeb}

/* Scroll bas */
.scroll-btn{position:absolute;bottom:80px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--wa-panel);border:none;color:var(--wa-muted);font-size:.95rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:10;transition:all .2s}
.scroll-btn:hover{background:var(--wa-item-hover);color:var(--wa-text)}
.scroll-btn.show{display:flex}
.scroll-btn .nbadge{position:absolute;top:-5px;right:-5px;background:var(--wa-green);color:white;border-radius:50%;width:17px;height:17px;font-size:.58rem;font-weight:700;display:none;align-items:center;justify-content:center}
.scroll-btn .nbadge.show{display:flex}

/* Réponse bar */
.reply-bar{background:#1f2c34;border-top:1px solid var(--wa-border);padding:8px 12px;display:none;align-items:center;gap:10px;flex-shrink:0;z-index:2}
.reply-bar.show{display:flex}
.rb-content{flex:1;border-left:3px solid var(--wa-green);padding-left:9px}
.rb-name{font-size:.74rem;font-weight:600;color:var(--wa-green);margin-bottom:2px}
.rb-text{font-size:.78rem;color:var(--wa-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{background:none;border:none;color:var(--wa-muted);font-size:1.1rem;cursor:pointer;padding:4px;border-radius:50%;transition:all .2s;flex-shrink:0}
.rb-close:hover{background:var(--wa-item-hover);color:var(--wa-text)}

/* Input zone */
.input-zone{background:var(--wa-panel);padding:8px 16px;display:flex;align-items:flex-end;gap:10px;flex-shrink:0;z-index:2}
.input-wrap{flex:1;background:var(--wa-input);border-radius:10px;display:flex;align-items:flex-end;padding:8px 12px;gap:8px;min-height:44px}
.msg-ta{flex:1;background:none;border:none;outline:none;color:var(--wa-text);font-size:.9rem;resize:none;font-family:inherit;max-height:120px;min-height:22px;line-height:1.4;padding:1px 0}
.msg-ta::placeholder{color:var(--wa-muted)}
.emoji-btn{background:none;border:none;color:var(--wa-muted);font-size:1.2rem;cursor:pointer;padding:2px;flex-shrink:0;line-height:1;transition:color .2s}
.emoji-btn:hover{color:var(--wa-text)}
.send-btn{width:50px;height:50px;border-radius:50%;background:var(--wa-green);border:none;color:white;font-size:1rem;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,168,132,.4)}
.send-btn:hover:not(:disabled){background:#06cf9c;transform:scale(1.05)}
.send-btn:disabled{background:var(--wa-input);color:var(--wa-muted);cursor:not-allowed;transform:none;box-shadow:none}

/* ══════════════ WELCOME / ACCESS DENIED ══════════════ */
.wa-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--wa-bg);z-index:1;position:relative}
.ww-icon{width:180px;height:180px;border-radius:50%;background:var(--wa-panel);display:flex;align-items:center;justify-content:center;font-size:4.5rem;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.ww-title{color:var(--wa-text);font-size:1.4rem;font-weight:300;margin-bottom:8px}
.ww-sub{color:var(--wa-muted);font-size:.88rem;text-align:center;max-width:340px;line-height:1.5}

.access-denied{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--wa-bg)}
.access-denied i{font-size:3.5rem;color:#2a3942;margin-bottom:16px}
.access-denied h3{color:var(--wa-muted);font-size:1.05rem;margin-bottom:6px}
.access-denied p{color:#374045;font-size:.85rem;text-align:center;max-width:260px;line-height:1.5}

/* ══════════════ PANEL INFO GROUPE ══════════════ */
.info-panel{width:0;overflow:hidden;transition:width .3s;background:var(--wa-sidebar);border-left:1px solid var(--wa-border);display:flex;flex-direction:column}
.info-panel.open{width:310px}
.ip-header{background:var(--wa-panel);padding:13px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--wa-border)}
.ip-header button{background:none;border:none;color:var(--wa-muted);font-size:.95rem;cursor:pointer;padding:6px;border-radius:50%}
.ip-header button:hover{background:var(--wa-item-hover);color:var(--wa-text)}
.ip-header span{color:var(--wa-text);font-size:.95rem;font-weight:600}
.ip-body{flex:1;overflow-y:auto}
.ip-cover{background:linear-gradient(135deg,#1e3a5f,#0d2137);padding:28px 16px;text-align:center;border-bottom:1px solid var(--wa-border)}
.ip-cover-icon{font-size:3rem;margin-bottom:8px}
.ip-cover-name{color:var(--wa-text);font-size:1.1rem;font-weight:600;margin-bottom:4px}
.ip-cover-desc{color:var(--wa-muted);font-size:.8rem;line-height:1.4}
.ip-section{padding:14px 16px}
.ip-section-title{color:var(--wa-green);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.ip-member{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a2530}
.ip-member:last-child{border-bottom:none}
.ip-member img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--wa-border)}
.ip-member-name{color:var(--wa-text);font-size:.85rem;font-weight:500}
.ip-member-role{color:var(--wa-muted);font-size:.71rem;margin-top:1px}
.ip-member-badge{background:rgba(0,168,132,.15);color:var(--wa-green);border-radius:4px;font-size:.62rem;padding:1px 5px;font-weight:600;margin-left:4px}

/* ══════════════ MENU CONTEXTUEL ══════════════ */
.ctx-menu{position:fixed;background:#233138;border-radius:6px;box-shadow:0 4px 18px rgba(0,0,0,.5);z-index:600;overflow:hidden;min-width:168px;animation:ctx-in .12s ease}
@keyframes ctx-in{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.ctx-item{padding:11px 16px;color:var(--wa-text);font-size:.85rem;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px}
.ctx-item:hover{background:var(--wa-item-hover)}
.ctx-item.danger{color:var(--danger)}
.ctx-item i{font-size:.82rem;width:15px;text-align:center;color:var(--wa-muted)}
.ctx-item.danger i{color:var(--danger)}

/* ══════════════ MODAL ADMIN - CRÉER GROUPE ══════════════ */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;align-items:center;justify-content:center}
.modal-ov.show{display:flex}
.modal-box{background:#1a2330;border-radius:14px;padding:26px;max-width:520px;width:92%;max-height:86vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-box h2{color:var(--wa-text);font-size:1.1rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.07);border:none;border-radius:50%;width:28px;height:28px;color:var(--wa-muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--danger);color:white}
.fg{margin-bottom:14px}
.fg label{display:block;margin-bottom:5px;font-size:.82rem;font-weight:500;color:var(--wa-muted)}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;background:var(--wa-input);border:1px solid var(--wa-border);border-radius:7px;color:var(--wa-text);font-size:.87rem;font-family:inherit;transition:border-color .2s;outline:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--wa-green)}
.fg textarea{resize:vertical;min-height:70px}
.members-picker{max-height:200px;overflow-y:auto;background:var(--wa-input);border:1px solid var(--wa-border);border-radius:7px;padding:6px}
.members-picker::-webkit-scrollbar{width:4px}
.members-picker::-webkit-scrollbar-thumb{background:#374045;border-radius:2px}
.member-check{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:5px;cursor:pointer;transition:background .15s}
.member-check:hover{background:rgba(255,255,255,.05)}
.member-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--wa-green);flex-shrink:0}
.member-check img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid var(--wa-border)}
.member-check span{color:var(--wa-text);font-size:.84rem}
.btn-green{padding:10px 22px;background:var(--wa-green);color:white;border:none;border-radius:7px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btn-green:hover{background:#06cf9c;transform:translateY(-1px)}
.btn-danger{padding:10px 22px;background:var(--danger);color:white;border:none;border-radius:7px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.modal-btns{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.fb-ok{padding:8px 12px;background:rgba(0,168,132,.15);color:var(--wa-green);border-radius:6px;font-size:.83rem;margin-top:10px}
.fb-err{padding:8px 12px;background:rgba(244,67,54,.15);color:var(--danger);border-radius:6px;font-size:.83rem;margin-top:10px}

/* ══════════════ LOADING / EMPTY ══════════════ */
.spin-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--wa-bg)}
.spin-wrap::after{content:'';width:30px;height:30px;border:3px solid var(--wa-panel);border-top-color:var(--wa-green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════ MOBILE ══════════════ */
@media(max-width:768px){
  .wa-sidebar{position:absolute;top:0;left:0;bottom:0;z-index:10}
  .wa-sidebar.hidden{transform:translateX(-100%)}
  .wa-chat{position:absolute;inset:0;z-index:5}
  .wa-chat.hidden{display:none}
  .info-panel.open{position:absolute;top:0;right:0;bottom:0;z-index:15;width:100%}
  .messages-area{padding:10px 4%}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <img class="topbar-logo" src="../images/logo/logo.png" alt="Logo" onerror="this.style.display='none'">
  <span class="topbar-title">Ngozistes du Royaume</span>
  <div class="topbar-spacer"></div>
  <div class="topbar-user">
    <img id="tu-av" src="" alt="" onerror="if(!this.dataset.e){this.dataset.e=1;this.src=window.FALLBACK_AVATAR;}">
    <span id="tu-name"></span>
  </div>
</div>

<!-- LAYOUT -->
<div class="wa-layout" id="wa-layout">

  <!-- SIDEBAR -->
  <div class="wa-sidebar" id="wa-sidebar">
    <div class="sb-header">
      <div class="sb-header-left">
        <img class="sb-my-av" id="sb-av" src="" alt="" onerror="if(!this.dataset.e){this.dataset.e=1;this.src=window.FALLBACK_AVATAR;}">
        <span class="sb-title">Groupes Bureau</span>
      </div>
      <div class="sb-icons">
        <button class="icon-btn" id="btn-new-group" title="Créer un groupe" style="display:none;" onclick="openCreateModal()">
          <i class="fas fa-plus"></i>
        </button>

      </div>
    </div>

    <div class="sb-search">
      <div class="search-box">
        <i class="fas fa-magnifying-glass"></i>
        <input type="text" placeholder="Rechercher un groupe…" id="grp-search" oninput="filterGroups(this.value)">
      </div>
    </div>

    <div class="conv-list" id="conv-list">
      <div class="spin-wrap" style="height:200px;flex:none;"></div>

  <!-- CHAT -->
  <div class="wa-chat" id="wa-chat" style="display:none;">

  </div>

</div>

<div class="modal-ov" id="modal-group">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <h2 id="modal-title"><i class="fas fa-users"></i> Créer un groupe</h2>
    <input type="hidden" id="edit-group-id">
    <div class="fg">
      <label>Nom du groupe *</label>
      <input type="text" id="grp-name" placeholder="Ex : Bureau Exécutif" maxlength="80">

      <label>Description</label>

    </div>
  </div>

<!-- MENU CONTEXTUEL -->
<div class="ctx-menu" id="ctx-menu" style="display:none;"></div>

<script>
'use strict';

// ══════════════════════════════════════════
// ÉTAT GLOBAL
// ══════════════════════════════════════════
var CU        = null;       // currentUser
var groups    = [];         // tous les groupes visibles
var activeGrp = null;       // groupe actif {id, name, icon, description, members:[]}
var messages  = [];
var replyTo   = null;
var realtimeSub = null;
var newCount  = 0;
var lastDate  = null;
var infoOpen  = false;
var isAdmin   = false;
var allBureauMembers = [];  // pour le picker

var COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7'];
var colorMap = {};
var colorIdx = 0;
function senderColor(id){ if(!colorMap[id]){ colorMap[id]=COLORS[colorIdx%COLORS.length]; colorIdx++; } return colorMap[id]; }

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async function(){
  CU = window.Auth ? window.Auth.getCurrentUser() : null;
  if (!CU){ window.location.href='../login.html'; return; }

  // Vérifier accès bureau
  if (!CU.is_bureau && CU.role !== 'admin' && CU.role !== 'super_admin'){
    document.getElementById('wa-sidebar').style.display='none';
    document.getElementById('wa-welcome').style.display='none';
    document.getElementById('wa-chat').style.display='none';
    var denied = document.createElement('div');
    denied.className='access-denied';
    denied.innerHTML='<i class="fas fa-lock"></i><h3>Accès restreint</h3><p>Vous n\'êtes pas membre du bureau. Contactez un administrateur.</p>';
    document.getElementById('wa-layout').appendChild(denied);
    return;
  }

  isAdmin = CU.role === 'admin' || CU.role === 'super_admin';

  // Afficher bouton créer groupe pour admins
  if (isAdmin){ document.getElementById('btn-new-group').style.display='flex'; }

  renderTopbar();
  initInput();
  initCtxMenu();
  checkMobile();

  await Promise.all([loadGroups(), loadBureauMembers()]);
});

function renderTopbar(){
  var av = document.getElementById('tu-av');
  var nm = document.getElementById('tu-name');
  var sbAv = document.getElementById('sb-av');
  if(av) av.src = CU.photo || window.FALLBACK_AVATAR;
  if(sbAv) sbAv.src = CU.photo || window.FALLBACK_AVATAR;
  if(nm) nm.textContent = CU.prenom || '';
}

// ══════════════════════════════════════════
// CHARGER LES GROUPES
// ══════════════════════════════════════════
async function loadGroups(){
  var list = document.getElementById('conv-list');
  try {
    // Récupérer tous les groupes où l'utilisateur est membre
    var r = await window.supabase
      .from('bureau_groups')
      .select('*, bureau_group_members!inner(user_id)')
      .eq('bureau_group_members.user_id', CU.id)
      .eq('is_active', true)
      .order('created_at', { ascending: false });

    // Si admin, récupérer aussi les groupes qu'il a créés
    var adminGroups = [];
    if (isAdmin){
      var r2 = await window.supabase
        .from('bureau_groups')
        .select('*')
        .eq('is_active', true)
        .order('created_at', { ascending: false });
      adminGroups = r2.data || [];
    }

    var myGroups = r.data || [];
    // Fusionner sans doublons
    var seen = new Set();
    groups = [];
    myGroups.forEach(function(g){ if(!seen.has(g.id)){ seen.add(g.id); groups.push(g); } });
    adminGroups.forEach(function(g){ if(!seen.has(g.id)){ seen.add(g.id); groups.push(g); } });

    // Charger le dernier message de chaque groupe
    for(var i=0; i<groups.length; i++){
      var g = groups[i];
      var lm = await window.supabase
        .from('bureau_chat_messages')
        .select('content,sent_at,sender:sender_id(prenom)')
        .eq('group_id', g.id)
        .is('deleted_for_all', null) // pas supprimé globalement
        .order('sent_at',{ascending:false}).limit(1).maybeSingle();
      if(lm.data){
        g._lastMsg = lm.data;
        g._lastTime = lm.data.sent_at;
      }
    }

    // Trier par dernier message
    groups.sort(function(a,b){
      var ta = a._lastTime || a.created_at;
      var tb = b._lastTime || b.created_at;
      return new Date(tb) - new Date(ta);
    });

    renderGroupList(groups);
  } catch(err){
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--wa-muted);font-size:.83rem;">Erreur de chargement</div>';
  }
}

function renderGroupList(grps){
  var list = document.getElementById('conv-list');
  if(!grps.length){
    list.innerHTML='<div style="padding:32px 16px;text-align:center;color:var(--wa-muted);font-size:.83rem;">'
      +(isAdmin ? '🔒 Aucun groupe.<br>Créez-en un avec <i class="fas fa-plus"></i>' : 'Aucun groupe disponible.')
      +'</div>';
    return;
  }
  list.innerHTML = grps.map(function(g){ return groupItem(g); }).join('');
}

function groupItem(g){
  var icon = g.icon || '👥';
  var lastSender = g._lastMsg && g._lastMsg.sender ? (g._lastMsg.sender.prenom+' : ') : '';
  var preview = g._lastMsg ? lastSender + esc(trunc(g._lastMsg.content||'',36)) : 'Aucun message';
  var time = g._lastTime ? fmtTime(g._lastTime) : '';
  var active = activeGrp && activeGrp.id === g.id ? ' active' : '';

  return '<div class="conv-item'+active+'" data-gid="'+esc(g.id)+'" onclick="openGroup(\''+esc(g.id)+'\')">'
    +'<div class="conv-av" style="background:#1e3a5f;font-size:1.3rem;">'+esc(icon)+'</div>'
    +'<div class="conv-info">'
    +'<div class="conv-top"><span class="conv-name">'+esc(g.name)+'</span><span class="conv-time">'+time+'</span></div>'
    +'<div class="conv-bottom"><span class="conv-prev">'+preview+'</span></div>'
    +'</div></div>';
}

function filterGroups(q){
  var filtered = groups.filter(function(g){ return g.name.toLowerCase().includes(q.toLowerCase()); });
  renderGroupList(filtered);
}

// ══════════════════════════════════════════
// OUVRIR UN GROUPE
// ══════════════════════════════════════════
async function openGroup(gid){
  // Stopper l'ancien realtime
  if(realtimeSub){ window.supabase.removeChannel(realtimeSub); realtimeSub=null; }
  newCount = 0;
  lastDate = null;
  messages = [];
  replyTo  = null;
  cancelReply();

  var g = groups.find(function(x){ return x.id===gid; });
  if(!g) return;

  // Récupérer les membres
  var mR = await window.supabase
    .from('bureau_group_members')
    .select('user:user_id(id,prenom,nom,photo,role,is_bureau)')
    .eq('group_id', gid);
  g.members = (mR.data||[]).map(function(r){ return r.user; }).filter(Boolean);

  activeGrp = g;

  // Update sidebar
  document.querySelectorAll('.conv-item').forEach(function(el){ el.classList.toggle('active', el.dataset.gid===gid); });

  // Update header
  var icon = g.icon || '👥';
  document.getElementById('ch-av').textContent = icon;
  document.getElementById('ch-name').textContent = g.name;
  document.getElementById('ch-sub').textContent = g.members.length + ' membre(s)';

  // Boutons admin
  if(isAdmin){
    document.getElementById('btn-edit-group').style.display='flex';
    document.getElementById('btn-delete-group').style.display='flex';
  }

  // Afficher chat
  document.getElementById('wa-welcome').style.display='none';
  document.getElementById('wa-chat').style.display='flex';

  // Fermer info panel
  if(infoOpen){ infoOpen=false; document.getElementById('info-panel').classList.remove('open'); }

  // Charger messages
  await loadMessages(gid);
  subscribeGroup(gid);

  // Mobile
  if(window.innerWidth<=768) hideSidebar();
}

// ══════════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════════
async function loadMessages(gid){
  var area = document.getElementById('msg-area');
  area.innerHTML = '<div class="spin-wrap" style="height:200px;flex:none;"></div>';

  try {
    // Suppressions perso
    var delR = await window.supabase.from('bureau_chat_deletions').select('message_id,delete_for_all').eq('user_id', CU.id);
    var myDel = {};
    (delR.data||[]).forEach(function(d){ myDel[d.message_id]=d; });

    // Suppressions globales
    var allDelR = await window.supabase.from('bureau_chat_deletions').select('message_id').eq('delete_for_all',true);
    var allDel = new Set((allDelR.data||[]).map(function(d){ return d.message_id; }));

    var r = await window.supabase
      .from('bureau_chat_messages')
      .select('*, sender:sender_id(id,prenom,nom,photo), reply_msg:reply_to(id,content,sender:sender_id(prenom,nom))')
      .eq('group_id', gid)
      .order('sent_at',{ascending:true})
      .limit(150);

    if(r.error) throw r.error;

    messages = (r.data||[]).map(function(m){
      m._delMe  = !!myDel[m.id];
      m._delAll = allDel.has(m.id);
      return m;
    });

    renderMessages();
    scrollBot(false);
  } catch(err){
    area.innerHTML='<div style="color:var(--wa-muted);text-align:center;padding:40px;font-size:.85rem;">Erreur de chargement</div>';
  }
}

function renderMessages(){
  var area = document.getElementById('msg-area');
  lastDate = null;
  if(!messages.length){
    area.innerHTML='<div style="text-align:center;color:var(--wa-muted);padding:40px;font-size:.85rem;">Aucun message. Lancez la discussion ! 👋</div>';
    return;
  }
  area.innerHTML = messages.map(function(m){ return bubbleHtml(m); }).join('');
}

function bubbleHtml(m){
  var mine = m.sender_id === CU.id;
  var d = new Date(m.sent_at);
  var dateStr = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var html = '';

  if(dateStr !== lastDate){
    lastDate = dateStr;
    html += '<div class="date-chip">'+esc(dateStr)+'</div>';
  }

  html += rowHtml(m, mine);
  return html;
}

function rowHtml(m, mine){
  var mid = esc(m.id);
  var time = new Date(m.sent_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var sender = m.sender || {};

  // Avatar
  var avHtml = '';
  if(!mine){
    var prevM = messages[messages.indexOf(m)-1];
    var sameSender = prevM && prevM.sender_id===m.sender_id && !prevM._delAll && !prevM._delMe;
    var photo = esc(sender.photo||window.FALLBACK_AVATAR);
    avHtml = sameSender
      ? '<img class="msg-av hidden" src="" alt="">'
      : '<img class="msg-av" src="'+photo+'" alt="" onerror="if(!this.dataset.e){this.dataset.e=1;this.src=\''+window.FALLBACK_AVATAR+'\'}">';
  }

  // Supprimé
  if(m._delAll || m._delMe){
    return '<div class="msg-row '+(mine?'mine':'theirs')+'" id="row-'+mid+'">'
      +avHtml
      +'<div class="bubble" id="bub-'+mid+'"><div class="msg-deleted"><i class="fas fa-ban"></i> Message supprimé</div>'
      +'<div class="msg-footer"><span class="msg-time">'+time+'</span></div></div></div>';
  }

  // Nom expéditeur
  var senderHtml='';
  if(!mine){
    var prevM2=messages[messages.indexOf(m)-1];
    var sameSender2=prevM2&&prevM2.sender_id===m.sender_id&&!prevM2._delAll;
    if(!sameSender2){
      var cc=senderColor(sender.id||m.sender_id);
      senderHtml='<div class="msg-sender '+cc+'">'+esc((sender.prenom||'')+' '+(sender.nom||''))+'</div>';
    }
  }

  // Réponse
  var replyHtml='';
  if(m.reply_msg){
    var rs=m.reply_msg.sender||{};
    replyHtml='<div class="reply-quote" onclick="scrollToMsg(\''+esc(m.reply_to)+'\')">'
      +'<div class="rq-name">'+esc((rs.prenom||'')+' '+(rs.nom||''))+'</div>'
      +'<div class="rq-text">'+esc(trunc(m.reply_msg.content||'',60))+'</div>'
      +'</div>';
  }

  // Ticks
  var ticksHtml = mine ? '<span class="msg-ticks'+(m.is_read?' read':'')+'"><i class="fas fa-check-double"></i></span>' : '';

  return '<div class="msg-row '+(mine?'mine':'theirs')+'" id="row-'+mid+'">'
    +avHtml
    +'<div class="bubble" id="bub-'+mid+'"'
    +' oncontextmenu="showCtx(event,\''+mid+'\')" ontouchstart="touchStart(event,\''+mid+'\')" ontouchend="touchEnd()">'
    +senderHtml+replyHtml
    +'<div class="msg-text">'+esc(m.content||'')+'</div>'
    +'<div class="msg-footer"><span class="msg-time">'+time+'</span>'+ticksHtml+'</div>'
    +'</div></div>';
}

function appendMsg(m){
  var area = document.getElementById('msg-area');
  var mine = m.sender_id === CU.id;
  var d = new Date(m.sent_at);
  var dateStr = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  if(dateStr!==lastDate){
    lastDate=dateStr;
    var chip=document.createElement('div');
    chip.className='date-chip'; chip.textContent=dateStr;
    area.appendChild(chip);
  }

  var tmp=document.createElement('div');
  tmp.innerHTML=rowHtml(m,mine);
  while(tmp.firstChild) area.appendChild(tmp.firstChild);
}

// ══════════════════════════════════════════
// REALTIME
// ══════════════════════════════════════════
function subscribeGroup(gid){
  realtimeSub = window.supabase
    .channel('grp-'+gid+'-'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'bureau_chat_messages',filter:'group_id=eq.'+gid}, async function(payload){
      var r = await window.supabase
        .from('bureau_chat_messages')
        .select('*, sender:sender_id(id,prenom,nom,photo), reply_msg:reply_to(id,content,sender:sender_id(prenom,nom))')
        .eq('id',payload.new.id).single();
      if(!r.data) return;
      var m=r.data; m._delMe=false; m._delAll=false;
      messages.push(m);

      var area=document.getElementById('msg-area');
      var atBot=area.scrollHeight-area.scrollTop-area.clientHeight<100;
      appendMsg(m);

      if(!atBot && m.sender_id!==CU.id){
        newCount++;
        var btn=document.getElementById('scroll-btn');
        var nb=document.getElementById('new-badge');
        btn.classList.add('show'); nb.textContent=newCount; nb.classList.add('show');
      } else {
        scrollBot(true);
      }

      // Update sidebar preview
      var gi=groups.find(function(x){return x.id===gid;});
      if(gi){
        gi._lastMsg={content:m.content,sender:m.sender};
        gi._lastTime=m.sent_at;
        var el=document.querySelector('.conv-item[data-gid="'+gid+'"]');
        if(el){
          var pr=el.querySelector('.conv-prev');
          if(pr){
            var s=m.sender?(m.sender.prenom+' : '):'';
            pr.textContent=s+trunc(m.content||'',36);
          }
          var tm=el.querySelector('.conv-time');
          if(tm) tm.textContent=fmtTime(m.sent_at);
        }
      }
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'bureau_chat_deletions'}, function(payload){
      var d=payload.new;
      var idx=messages.findIndex(function(m){return m.id===d.message_id;});
      if(idx===-1) return;
      if(d.delete_for_all) messages[idx]._delAll=true;
      if(d.user_id===CU.id) messages[idx]._delMe=true;
      var row=document.getElementById('row-'+d.message_id);
      if(row){
        var tmp=document.createElement('div');
        tmp.innerHTML=rowHtml(messages[idx],messages[idx].sender_id===CU.id);
        row.replaceWith(tmp.firstChild);
      }
    })
    .subscribe();
}

// ══════════════════════════════════════════
// ENVOYER UN MESSAGE
// ══════════════════════════════════════════
async function sendMsg(){
  var inp=document.getElementById('msg-input');
  var content=inp.value.trim();
  if(!content||!activeGrp) return;
  var btn=document.getElementById('send-btn');
  btn.disabled=true;

  try {
    var payload={
      group_id: activeGrp.id,
      sender_id: CU.id,
      content: content,
      sent_at: new Date().toISOString(),
      reply_to: replyTo ? replyTo.id : null
    };
    var r=await window.supabase.from('bureau_chat_messages').insert([payload]);
    if(r.error) throw r.error;
    inp.value=''; inp.style.height='auto';
    cancelReply();
    scrollBot(true);
  } catch(err){
    showToast('Erreur : '+err.message,'error');
  } finally {
    btn.disabled=!document.getElementById('msg-input').value.trim();
  }
}

// ══════════════════════════════════════════
// MENU CONTEXTUEL
// ══════════════════════════════════════════
var _tTimer=null;
function touchStart(e,mid){ _tTimer=setTimeout(function(){ showCtx(e,mid); },600); }
function touchEnd(){ if(_tTimer){clearTimeout(_tTimer);_tTimer=null;} }

function showCtx(e,mid){
  e.preventDefault();
  var msg=messages.find(function(m){return m.id===mid;});
  if(!msg||msg._delAll||msg._delMe) return;
  var mine=msg.sender_id===CU.id;

  var items=[{icon:'fa-reply',label:'Répondre',action:'reply'}];
  if(mine||isAdmin){
    items.push({icon:'fa-eye-slash',label:'Supprimer pour moi',action:'del-me'});
    items.push({icon:'fa-trash',label:'Supprimer pour tous',action:'del-all',danger:true});
  } else {
    items.push({icon:'fa-eye-slash',label:'Supprimer pour moi',action:'del-me'});
  }

  var menu=document.getElementById('ctx-menu');
  menu.innerHTML=items.map(function(it){
    return '<div class="ctx-item'+(it.danger?' danger':'')+'" onclick="doCtx(\''+it.action+'\',\''+esc(mid)+'\')">'
      +'<i class="fas '+it.icon+'"></i>'+it.label+'</div>';
  }).join('');

  var x=e.touches?e.touches[0].clientX:e.clientX;
  var y=e.touches?e.touches[0].clientY:e.clientY;
  x=Math.min(x,window.innerWidth-180); y=Math.min(y,window.innerHeight-items.length*44);
  menu.style.cssText='display:block;left:'+x+'px;top:'+y+'px;';
  setTimeout(function(){
    document.addEventListener('click',function cl(){menu.style.display='none';document.removeEventListener('click',cl);},{once:true});
  },50);
}

function initCtxMenu(){
  document.addEventListener('contextmenu',function(e){
    if(!e.target.closest('.bubble')) document.getElementById('ctx-menu').style.display='none';
  });
}

async function doCtx(action,mid){
  document.getElementById('ctx-menu').style.display='none';
  var msg=messages.find(function(m){return m.id===mid;});
  if(!msg) return;

  if(action==='reply'){
    replyTo=msg;
    var s=msg.sender||{};
    document.getElementById('rb-name').textContent=(s.prenom||'')+' '+(s.nom||'');
    document.getElementById('rb-text').textContent=trunc(msg.content||'',80);
    document.getElementById('reply-bar').classList.add('show');
    document.getElementById('msg-input').focus();
    return;
  }

  var forAll=action==='del-all';
  if(forAll&&!confirm('Supprimer pour tout le monde ?')) return;
  if(!forAll&&!confirm('Supprimer pour vous seulement ?')) return;

  try {
    var r=await window.supabase.from('bureau_chat_deletions').upsert([{
      message_id:mid, user_id:CU.id, delete_for_all:forAll, deleted_at:new Date().toISOString()
    }],{onConflict:'message_id,user_id'});
    if(r.error) throw r.error;

    var idx=messages.findIndex(function(m){return m.id===mid;});
    if(idx!==-1){ messages[idx]._delMe=true; if(forAll) messages[idx]._delAll=true; }
    var row=document.getElementById('row-'+mid);
    if(row){
      var tmp=document.createElement('div');
      tmp.innerHTML=rowHtml(messages[idx]||msg, msg.sender_id===CU.id);
      row.replaceWith(tmp.firstChild);
    }
    showToast('Message supprimé','success');
  } catch(err){ showToast('Erreur : '+err.message,'error'); }
}

function cancelReply(){
  replyTo=null;
  document.getElementById('reply-bar').classList.remove('show');
  document.getElementById('rb-name').textContent='';
  document.getElementById('rb-text').textContent='';
}

// ══════════════════════════════════════════
// INFO PANEL
// ══════════════════════════════════════════
function toggleInfo(){
  infoOpen=!infoOpen;
  document.getElementById('info-panel').classList.toggle('open',infoOpen);
  if(infoOpen && activeGrp) renderInfoPanel();
}

function renderInfoPanel(){
  var body=document.getElementById('ip-body');
  var g=activeGrp;
  var icon=g.icon||'👥';

  var membersHtml=(g.members||[]).map(function(m){
    var photo=esc(m.photo||window.FALLBACK_AVATAR);
    var roleLabel=m.role==='super_admin'?'Super Admin':m.role==='admin'?'Admin':'Membre du bureau';
    var isMe=m.id===CU.id;
    return '<div class="ip-member">'
      +'<img src="'+photo+'" alt="" onerror="if(!this.dataset.e){this.dataset.e=1;this.src=\''+window.FALLBACK_AVATAR+'\';}">'
      +'<div><div class="ip-member-name">'+esc((m.prenom||'')+' '+(m.nom||''))+(isMe?' <span class="ip-member-badge">vous</span>':'')+'</div>'
      +'<div class="ip-member-role">'+roleLabel+'</div></div>'
      +'</div>';
  }).join('');

  body.innerHTML='<div class="ip-cover">'
    +'<div class="ip-cover-icon">'+esc(icon)+'</div>'
    +'<div class="ip-cover-name">'+esc(g.name)+'</div>'
    +(g.description?'<div class="ip-cover-desc">'+esc(g.description)+'</div>':'')
    +'</div>'
    +'<div class="ip-section"><div class="ip-section-title">'+((g.members||[]).length)+' participant(s)</div>'
    +membersHtml+'</div>';
}

// ══════════════════════════════════════════
// ADMIN — CRÉER / MODIFIER / SUPPRIMER GROUPE
// ══════════════════════════════════════════
async function loadBureauMembers(){
  try {
    var r=await window.supabase.from('users').select('id,prenom,nom,photo,role,is_bureau')
      .or('is_bureau.eq.true,role.eq.admin,role.eq.super_admin')
      .eq('status','active').order('prenom');
    allBureauMembers=r.data||[];
  } catch(_){}
}

function openCreateModal(){
  document.getElementById('edit-group-id').value='';
  document.getElementById('modal-title').innerHTML='<i class="fas fa-users"></i> Créer un groupe';
  document.getElementById('grp-name').value='';
  document.getElementById('grp-desc').value='';
  document.getElementById('grp-icon').value='👥';
  document.getElementById('modal-fb').innerHTML='';
  renderMembersPicker([]);
  document.getElementById('modal-group').classList.add('show');
}

async function openEditModal(){
  if(!activeGrp||!isAdmin) return;
  var g=activeGrp;

  // Récupérer membres actuels
  var mR=await window.supabase.from('bureau_group_members').select('user_id').eq('group_id',g.id);
  var currentMemberIds=new Set((mR.data||[]).map(function(m){return m.user_id;}));

  document.getElementById('edit-group-id').value=g.id;
  document.getElementById('modal-title').innerHTML='<i class="fas fa-pen"></i> Modifier le groupe';
  document.getElementById('grp-name').value=g.name||'';
  document.getElementById('grp-desc').value=g.description||'';
  document.getElementById('grp-icon').value=g.icon||'👥';
  document.getElementById('modal-fb').innerHTML='';
  renderMembersPicker(currentMemberIds);
  document.getElementById('modal-group').classList.add('show');
}

function renderMembersPicker(selectedIds){
  var picker=document.getElementById('members-picker');
  if(!allBureauMembers.length){
    picker.innerHTML='<div style="padding:12px;text-align:center;color:var(--wa-muted);font-size:.82rem;">Aucun membre bureau disponible</div>';
    return;
  }
  picker.innerHTML=allBureauMembers.map(function(m){
    var photo=esc(m.photo||window.FALLBACK_AVATAR);
    var checked=selectedIds instanceof Set ? selectedIds.has(m.id) : false;
    return '<label class="member-check">'
      +'<input type="checkbox" value="'+esc(m.id)+'"'+(checked?' checked':'')+'>'
      +'<img src="'+photo+'" alt="" onerror="if(!this.dataset.e){this.dataset.e=1;this.src=\''+window.FALLBACK_AVATAR+'\';}">'
      +'<span>'+esc((m.prenom||'')+' '+(m.nom||''))+'</span>'
      +'</label>';
  }).join('');
}

async function saveGroup(){
  var name=document.getElementById('grp-name').value.trim();
  var desc=document.getElementById('grp-desc').value.trim();
  var icon=document.getElementById('grp-icon').value.trim()||'👥';
  var editId=document.getElementById('edit-group-id').value;
  var fb=document.getElementById('modal-fb');

  if(!name){ fb.innerHTML='<div class="fb-err">Le nom est requis.</div>'; return; }

  var checkedIds=Array.from(document.querySelectorAll('#members-picker input[type=checkbox]:checked')).map(function(el){ return el.value; });
  if(!checkedIds.length){ fb.innerHTML='<div class="fb-err">Sélectionnez au moins un membre.</div>'; return; }

  // Toujours inclure le créateur
  if(!checkedIds.includes(CU.id)) checkedIds.push(CU.id);

  try {
    var groupData={name:name,description:desc,icon:icon,is_active:true,updated_at:new Date().toISOString()};

    if(editId){
      // Mise à jour
      var r=await window.supabase.from('bureau_groups').update(groupData).eq('id',editId);
      if(r.error) throw r.error;

      // Supprimer les anciens membres et réinsérer
      await window.supabase.from('bureau_group_members').delete().eq('group_id',editId);
      var inserts=checkedIds.map(function(uid){ return {group_id:editId,user_id:uid,added_at:new Date().toISOString()}; });
      var r2=await window.supabase.from('bureau_group_members').insert(inserts);
      if(r2.error) throw r2.error;

      fb.innerHTML='<div class="fb-ok">Groupe mis à jour !</div>';
      // Recharger le groupe actif
      var gi=groups.find(function(x){return x.id===editId;});
      if(gi){gi.name=name;gi.description=desc;gi.icon=icon;}
      activeGrp.name=name; activeGrp.description=desc; activeGrp.icon=icon;
      document.getElementById('ch-name').textContent=name;
      document.getElementById('ch-av').textContent=icon;
    } else {
      // Création
      groupData.created_by=CU.id;
      groupData.created_at=new Date().toISOString();
      var r3=await window.supabase.from('bureau_groups').insert([groupData]).select().single();
      if(r3.error) throw r3.error;
      var newId=r3.data.id;

      var inserts2=checkedIds.map(function(uid){ return {group_id:newId,user_id:uid,added_at:new Date().toISOString()}; });
      var r4=await window.supabase.from('bureau_group_members').insert(inserts2);
      if(r4.error) throw r4.error;

      fb.innerHTML='<div class="fb-ok">Groupe créé !</div>';
    }

    setTimeout(function(){ closeModal(); loadGroups(); },1200);
  } catch(err){
    fb.innerHTML='<div class="fb-err">Erreur : '+esc(err.message)+'</div>';
  }
}

async function deleteGroup(){
  if(!activeGrp||!isAdmin) return;
  if(!confirm('Supprimer le groupe "'+activeGrp.name+'" ? Les messages seront conservés.')) return;
  try {
    var r=await window.supabase.from('bureau_groups').update({is_active:false}).eq('id',activeGrp.id);
    if(r.error) throw r.error;
    showToast('Groupe supprimé','success');
    activeGrp=null;
    document.getElementById('wa-chat').style.display='none';
    document.getElementById('wa-welcome').style.display='flex';
    await loadGroups();
  } catch(err){ showToast('Erreur : '+err.message,'error'); }
}

function closeModal(){
  document.getElementById('modal-group').classList.remove('show');
}

// ══════════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════════
function scrollBot(smooth){
  var area=document.getElementById('msg-area');
  area.scrollTo({top:area.scrollHeight,behavior:smooth?'smooth':'auto'});
  newCount=0;
  var btn=document.getElementById('scroll-btn'), nb=document.getElementById('new-badge');
  btn.classList.remove('show'); nb.classList.remove('show');
}

function scrollToMsg(mid){
  var el=document.getElementById('row-'+mid);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}
window.scrollToMsg=scrollToMsg;

function initInput(){
  var inp=document.getElementById('msg-input'), btn=document.getElementById('send-btn');
  inp.addEventListener('input',function(){
    btn.disabled=!this.value.trim();
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,120)+'px';
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!btn.disabled) sendMsg(); }
  });
  var area=document.getElementById('msg-area');
  if(area){ area.addEventListener('scroll',function(){
    var atBot=area.scrollHeight-area.scrollTop-area.clientHeight<100;
    if(atBot){ newCount=0; document.getElementById('scroll-btn').classList.remove('show'); document.getElementById('new-badge').classList.remove('show'); }
  }); }
}

function checkMobile(){
  if(window.innerWidth<=768){ document.getElementById('btn-back-mob').style.display='flex'; }
}
function hideSidebar(){ document.getElementById('wa-sidebar').classList.add('hidden'); }
function showSidebar(){ document.getElementById('wa-sidebar').classList.remove('hidden'); }
window.showSidebar=showSidebar;
window.addEventListener('resize',checkMobile);

function fmtTime(iso){
  if(!iso) return '';
  var d=new Date(iso), now=new Date();
  var diff=Math.floor((now-d)/86400000);
  if(diff===0) return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  if(diff===1) return 'Hier';
  if(diff<7) return d.toLocaleDateString('fr-FR',{weekday:'short'});
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function esc(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }
function trunc(t,n){ return t&&t.length>n ? t.slice(0,n)+'…' : (t||''); }

var showToast = window.showToast || function(msg,type){
  var c=document.getElementById('tc');
  if(!c){ c=document.createElement('div'); c.id='tc'; c.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;'; document.body.appendChild(c); }
  var t=document.createElement('div');
  var bg={success:'#00a884',error:'var(--danger)',info:'var(--secondary)',warning:'var(--warning)'}[type]||'var(--secondary)';
  t.style.cssText='padding:11px 18px;border-radius:8px;color:white;font-size:.85rem;background:'+bg+';box-shadow:0 3px 12px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;';
  t.textContent=msg; c.appendChild(t);
  requestAnimationFrame(function(){ t.style.opacity='1'; });
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); },300); },3200);
};
window.showToast=showToast;

window.addEventListener('beforeunload',function(){ if(realtimeSub) window.supabase.removeChannel(realtimeSub); });
</script>
